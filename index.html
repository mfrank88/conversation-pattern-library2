<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="mediumBlue" data-density="comfortable" data-card="bordered">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grace — Conversation Pattern Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>/* Conversation Pattern Library — base styles */

:root {
  /* Helix brand colors — Color Base 500s (helix.ascension.org) */
  --brand-ascension: #0F3C97;  /* Brand Blue 700 */
  --brand-medium: #1E69D2;     /* Brand Blue 500 · Primary/Main */
  --brand-violet: #B40F87;     /* Brand Violet 500 */
  --brand-green: #00A28A;      /* Brand Green 500 */
  --brand-tan: #FFF0CC;        /* Brand Gold 100 */
  --brand-orange: #B74900;     /* Warning/Main (700) */
  --brand-gold: #FFB400;       /* Brand Gold 700 */

  /* Helix semantic tokens */
  --success: #0C5C34;          /* Success/Main */
  --success-bg: #E9FBE7;       /* Success/Main Background */
  --error: #A1002F;            /* Error/Main */
  --error-bg: #FEEBE5;         /* Error/Main Background */
  --focus: #B40F87;            /* Focus/Main */

  /* Light theme surfaces — Helix Light Mode tokens */
  --bg: #FAFAFA;                       /* Background/Main */
  --bg-elev: #FFFFFF;                  /* Background/Component */
  --bg-muted: #F5F5F5;                 /* Info/Main Background */
  --bg-inset: #EEEEEE;                 /* Info/Auxiliary Background */
  --border: rgba(0, 0, 0, 0.12);       /* Other/Divider */
  --border-strong: rgba(0, 0, 0, 0.38);
  --text: rgba(0, 0, 0, 0.87);         /* Content/Primary */
  --text-muted: rgba(0, 0, 0, 0.6);    /* Content/Secondary */
  --text-subtle: #757575;              /* Gray 600 */

  /* Accent (default = Primary / Brand Blue) */
  --accent: var(--brand-medium);
  --accent-ink: #092A79;               /* Primary/Auxiliary */
  --accent-soft: #E8F5FE;              /* Primary/Main Background */

  /* Type — Helix web font stack */
  --font-sans: Whitney, Roboto, Arial, sans-serif;
  --font-mono: 'Roboto Mono', 'SF Mono', Menlo, monospace;
  --font-display: Whitney, Roboto, Arial, sans-serif;

  /* Density (swapped via [data-density]) */
  --space-unit: 8px;
  --row-pad-y: 14px;
  --card-pad: 24px;
  --font-body: 16px;    /* Helix bodySm 16/24 */
  --font-small: 14px;   /* Helix bodyXs 14/16 */
  --line-body: 1.5;

  /* Card (swapped via [data-card]) — Helix card shape: rounded-lg 20px */
  --card-radius: 20px;
  --card-shadow: 0 1px 2px rgba(15, 60, 151, 0.05);
  --card-border: 1px solid var(--border);
  --card-bg: var(--bg-elev);
}

/* Density variants */
[data-density="compact"] {
  --row-pad-y: 10px;
  --card-pad: 16px;
  --font-body: 14px;   /* bodyXs */
  --font-small: 12.5px;
  --line-body: 1.45;
}
[data-density="spacious"] {
  --row-pad-y: 20px;
  --card-pad: 32px;
  --font-body: 18px;   /* bodyBase 18/24 */
  --font-small: 14px;
  --line-body: 1.5;
}

/* Card style variants */
[data-card="flat"] {
  --card-shadow: none;
  --card-border: 1px solid transparent;
  --card-bg: var(--bg-muted);
}
[data-card="bordered"] {
  --card-shadow: none;
  --card-border: 1px solid var(--border);
  --card-bg: var(--bg-elev);
}
[data-card="shadowed"] {
  /* Helix raised card · shadow-md (blue-tinted triple shadow) */
  --card-shadow: 0 5px 6px rgba(15, 60, 151, 0.10), 0 3px 16px rgba(15, 60, 151, 0.06), 0 9px 12px rgba(15, 60, 151, 0.07);
  --card-border: 1px solid transparent;
  --card-bg: var(--bg-elev);
}

/* Accent variants */
[data-accent="ascensionBlue"] { --accent: #0F3C97; --accent-ink: #051D64; --accent-soft: #E8F5FE; }
[data-accent="mediumBlue"]   { --accent: #1E69D2; --accent-ink: #092A79; --accent-soft: #E8F5FE; }
[data-accent="violet"]       { --accent: #9A0A81; --accent-ink: #660468; --accent-soft: #FDE6EE; }
[data-accent="green"]        { --accent: #00806D; --accent-ink: #005E50; --accent-soft: #E6FFFB; }

/* Dark theme */
[data-theme="dark"] {
  --bg: #0E1116;
  --bg-elev: #151A21;
  --bg-muted: #1C222B;
  --bg-inset: #0A0D12;
  --border: #242B36;
  --border-strong: #37414F;
  --text: #ECEEF2;
  --text-muted: #A0A6B3;
  --text-subtle: #6B7384;
  --accent-soft: rgba(30, 105, 210, 0.15);
}
[data-theme="dark"][data-accent="violet"] { --accent-soft: rgba(154, 10, 129, 0.2); }
[data-theme="dark"][data-accent="green"] { --accent-soft: rgba(0, 162, 138, 0.18); }
[data-theme="dark"][data-accent="ascensionBlue"] { --accent-soft: rgba(15, 60, 151, 0.25); }
[data-theme="dark"][data-card="flat"] { --card-bg: var(--bg-muted); }
[data-theme="dark"][data-card="shadowed"] { --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.5), 0 10px 30px -15px rgba(0, 0, 0, 0.7); }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: var(--font-body);
  line-height: var(--line-body);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* App shell */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: auto 1fr;
  grid-template-areas: "side top" "side main";
}
.app[data-layout="topnav"] {
  grid-template-columns: 1fr;
  grid-template-areas: "top" "main";
}

/* Sidebar */
.sidebar {
  grid-area: side;
  border-right: 1px solid var(--border);
  background: var(--bg-elev);
  padding: 24px 18px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.app[data-layout="topnav"] .sidebar { display: none; }
.wordmark {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 28px;
  padding: 0 8px;
}
.wordmark-dot {
  width: 10px; height: 10px; border-radius: 2px;
  background: var(--accent);
  transform: translateY(1px);
}
.wordmark-main {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.01em;
  color: var(--text);
}
.wordmark-sub {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-subtle);
  font-weight: 500;
}

.nav-section {
  margin-bottom: 20px;
}
.nav-label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-subtle);
  font-weight: 600;
  padding: 0 10px;
  margin-bottom: 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  transition: background 0.12s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.nav-item:hover { background: var(--bg-muted); color: var(--text); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent-ink);
}
[data-theme="dark"] .nav-item.active { color: var(--text); }
.nav-item .count {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-subtle);
  font-variant-numeric: tabular-nums;
}

/* Top bar */
.topbar {
  grid-area: top;
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.app[data-layout="topnav"] .topbar { padding-left: 28px; }
.topbar-wordmark {
  display: none;
}
.app[data-layout="topnav"] .topbar-wordmark {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-right: 32px;
}
.app[data-layout="topnav"] .topbar-nav {
  display: flex;
  gap: 4px;
}
.topbar-nav { display: none; }
.topbar-nav-item {
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: none;
  font-family: inherit;
}
.topbar-nav-item:hover { background: var(--bg-muted); color: var(--text); }
.topbar-nav-item.active { background: var(--accent-soft); color: var(--accent-ink); }
[data-theme="dark"] .topbar-nav-item.active { color: var(--text); }

.search {
  flex: 1;
  max-width: 480px;
  position: relative;
}
.search input {
  width: 100%;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  padding: 0 12px 0 36px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-subtle);
  pointer-events: none;
}
.kbd {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-subtle);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--bg-muted);
  pointer-events: none;
}

.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* Main */
main {
  grid-area: main;
  padding: 40px 48px 80px;
  max-width: 1400px;
  width: 100%;
}

/* Buttons — Helix button spec: full-round pill, Semibold tracked uppercase label */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 7px 18px;
  border-radius: 999px;                 /* full round corner */
  border: 1.5px solid var(--accent);    /* Secondary (Outlined) */
  background: transparent;
  color: var(--accent);
  font-family: inherit;
  font-size: 13px;                      /* Helix `button` token, scaled for tool chrome */
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.12s;
}
.btn:hover {
  color: var(--accent-ink);
  border-color: var(--accent-ink);
  background: color-mix(in srgb, var(--accent) 4%, transparent);  /* State Overlays / Hovered */
  box-shadow: 0 1px 3px rgba(15, 60, 151, 0.18);                  /* shadow-sm */
}
.btn:disabled {
  border-color: rgba(0, 0, 0, 0.12);    /* Background/Disabled */
  color: rgba(0, 0, 0, 0.38);           /* Content/Disabled */
  background: transparent;
  box-shadow: none;
  cursor: default;
}
.btn.primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn.primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
.btn.ghost { border-color: transparent; background: transparent; }    /* Tertiary (Text) */
.btn.ghost:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); border-color: transparent; box-shadow: none; }

/* Page header */
.page-head {
  margin-bottom: 36px;
}
.eyebrow {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}
h1.page-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 42px;   /* Helix titleXl 42/48 · Medium */
  line-height: 48px;
  letter-spacing: -1px;
  margin: 0 0 10px;
  color: var(--text);
}
.page-desc {
  font-size: 18px;   /* Helix bodyBase 18/24 */
  color: var(--text-muted);
  max-width: 680px;
  margin: 0;
  line-height: 1.55;
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  align-items: center;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}
.chip:hover { border-color: var(--border-strong); color: var(--text); }
.chip.on {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-ink);
  font-weight: 500;
}
[data-theme="dark"] .chip.on { color: var(--text); }
.chip .x { opacity: 0.5; margin-left: 2px; }

/* Pattern grid */
.pattern-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}
.pattern-card {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  padding: var(--card-pad);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  text-align: left;
  font-family: inherit;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 240px;
}
.pattern-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-2px);
}
[data-card="shadowed"] .pattern-card:hover {
  box-shadow: 0 4px 8px rgba(20, 20, 30, 0.06), 0 20px 40px -18px rgba(20, 20, 30, 0.15);
}
.pattern-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--card-accent, var(--accent));
  opacity: 0;
  transition: opacity 0.15s;
}
.pattern-card:hover::before { opacity: 1; }

.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.card-badge {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--card-accent-soft, var(--accent-soft));
  color: var(--card-accent, var(--accent-ink));
}
.card-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  color: var(--text-subtle);
  font-variant-numeric: tabular-nums;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.status-dot.production { background: var(--brand-green); }
.status-dot.beta { background: var(--brand-orange); }
.status-dot.draft { background: var(--brand-gold); }
.status-dot.deprecated { background: var(--text-subtle); }

.card-title {
  font-family: var(--font-display);
  font-size: 20px;   /* Helix titleXs 20/24 · Semibold */
  font-weight: 600;
  letter-spacing: 0.15px;
  line-height: 24px;
  margin: 0;
}
.card-summary {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.5;
  margin: 0;
  flex: 1;
}
.card-meta {
  display: flex;
  gap: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-subtle);
}
.card-meta .val { color: var(--text); font-weight: 500; }
.card-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.tag {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 3px;
  background: var(--bg-muted);
  color: var(--text-muted);
  font-weight: 500;
}

/* Tweaks panel */
.tweaks-panel {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 280px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.05);
  z-index: 100;
  overflow: hidden;
}
[data-theme="dark"] .tweaks-panel {
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 2px 6px rgba(0, 0, 0, 0.3);
}
.tweaks-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-muted);
}
.tweaks-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.tweaks-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }
.tweak-row { display: flex; flex-direction: column; gap: 6px; }
.tweak-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-subtle); font-weight: 600; }
.seg {
  display: flex;
  background: var(--bg-muted);
  border-radius: 6px;
  padding: 2px;
  gap: 2px;
}
.seg button {
  flex: 1;
  padding: 6px 8px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-muted);
  text-transform: capitalize;
}
.seg button.on { background: var(--bg-elev); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
[data-theme="dark"] .seg button.on { background: var(--bg-inset); }

.swatches { display: flex; gap: 6px; }
.swatch {
  width: 28px; height: 28px; border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s;
}
.swatch:hover { transform: scale(1.1); }
.swatch.on { border-color: var(--text); }

/* Detail page */
.detail-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 48px;
}
.detail-main { min-width: 0; }
.detail-side {
  position: sticky;
  top: 88px;
  align-self: start;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.detail-head {
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
  margin-bottom: 32px;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-subtle);
  margin-bottom: 14px;
}
.breadcrumb button {
  background: none; border: none; cursor: pointer; font-family: inherit;
  color: var(--text-muted); font-size: 13px; padding: 0;
}
.breadcrumb button:hover { color: var(--text); text-decoration: underline; }
.detail-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 42px;   /* Helix titleXl 42/48 · Medium */
  line-height: 48px;
  letter-spacing: -1px;
  margin: 0 0 14px;
}
.detail-summary {
  font-size: 18px;   /* Helix bodyBase */
  line-height: 1.5;
  color: var(--text-muted);
  max-width: 680px;
  margin: 0 0 18px;
}
.detail-meta-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 13px;
  color: var(--text-subtle);
}
.detail-meta-row .item { display: inline-flex; align-items: center; gap: 6px; }
.detail-meta-row .item strong { color: var(--text); font-weight: 500; }

/* Section */
.section {
  margin-bottom: 48px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 24px;   /* Helix titleSm 24/32 · Semibold */
  font-weight: 600;
  line-height: 32px;
  letter-spacing: 0.25px;
  margin: 0 0 14px;
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.section-title .section-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
}
.section-lead { color: var(--text-muted); margin: 0 0 18px; max-width: 680px; }

/* Metrics */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}
.metric {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  padding: 16px 18px;
  box-shadow: var(--card-shadow);
}
.metric-label { font-size: 12px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 8px; }
.metric-val { font-family: var(--font-display); font-size: 28px; font-weight: 500; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
.metric-delta {
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.metric-delta.up { color: var(--success); }
.metric-delta.down { color: var(--brand-orange); }
.metric-delta.flat { color: var(--text-subtle); }

/* Two-col block (when-to-use) */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.note-card {
  padding: 18px 20px;
  border-radius: var(--card-radius);
  border: 1px solid var(--border);
  background: var(--card-bg);
}
.note-card.good { border-left: 3px solid var(--success); }
.note-card.bad { border-left: 3px solid var(--error); }
.note-card h4 { margin: 0 0 6px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-subtle); font-weight: 600; }
.note-card p { margin: 0; color: var(--text); line-height: 1.5; font-size: 14.5px; }

/* Transcript / Simulator */
.simulator {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.sim-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-muted);
}
.sim-head-left { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
.sim-head-right { display: flex; gap: 6px; }
.sim-dots { display: flex; gap: 4px; }
.sim-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
.sim-dots span.live { background: var(--brand-green); animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.sim-body {
  min-height: 320px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: var(--bg-inset);
}
.bubble {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14.5px;
  line-height: 1.45;
  position: relative;
  animation: bubbleIn 0.3s ease-out;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.bubble.grace {
  background: var(--accent);
  color: white;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.bubble.patient {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.bubble-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 4px;
  opacity: 0.8;
}
.bubble-note {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid rgba(255, 255, 255, 0.2);
  font-size: 12px;
  font-family: var(--font-mono);
  opacity: 0.85;
  line-height: 1.4;
}
.bubble.patient .bubble-note {
  border-top-color: var(--border);
  color: var(--text-subtle);
}

.typing {
  align-self: flex-start;
  background: var(--accent);
  padding: 10px 14px;
  border-radius: 14px;
  border-bottom-left-radius: 4px;
  display: inline-flex;
  gap: 4px;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.7);
  animation: typing 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

.sim-controls {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  background: var(--bg-elev);
  gap: 12px;
  flex-wrap: wrap;
}
.sim-progress {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text-subtle);
  font-variant-numeric: tabular-nums;
}
.sim-progress-bar {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.sim-progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s;
}
.sim-btns { display: flex; gap: 6px; }

/* Channel variants in simulator */
.channel-switch {
  display: flex;
  background: var(--bg-muted);
  border-radius: 6px;
  padding: 2px;
  gap: 2px;
}
.channel-switch button {
  padding: 4px 10px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-muted);
  font-weight: 500;
}
.channel-switch button.on { background: var(--bg-elev); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
[data-theme="dark"] .channel-switch button.on { background: var(--bg-inset); }

/* Flow diagram */
.flow-diagram {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  padding: 28px;
  overflow-x: auto;
}
.flow-svg { display: block; min-width: 100%; }
.flow-node rect { fill: var(--bg-elev); stroke: var(--border-strong); stroke-width: 1.5; transition: all 0.2s; }
.flow-node.entry rect { fill: var(--accent-soft); stroke: var(--accent); }
.flow-node.exit-ok rect { fill: var(--success-bg); stroke: var(--success); }
.flow-node.exit-fail rect { fill: var(--error-bg); stroke: var(--error); }
.flow-node.decision rect { fill: var(--bg-muted); }
.flow-node.action rect { stroke-dasharray: 4 3; }
[data-theme="dark"] .flow-node.exit-ok rect { fill: rgba(25,128,56,0.18); }
[data-theme="dark"] .flow-node.exit-fail rect { fill: rgba(224,0,25,0.15); }
.flow-node text { font-family: var(--font-sans); font-size: 12px; fill: var(--text); font-weight: 500; }
.flow-edge { stroke: var(--border-strong); stroke-width: 1.5; fill: none; }
.flow-edge-arrow { fill: var(--border-strong); }

/* Edge cases list */
.edge-list { display: flex; flex-direction: column; gap: 10px; }
.edge-item {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 20px;
  padding: 16px 18px;
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
}
.edge-item .edge-title { font-weight: 600; color: var(--text); }
.edge-item .edge-behavior { color: var(--text-muted); font-size: 14.5px; line-height: 1.5; }

/* Compliance */
.compliance-list { padding-left: 20px; margin: 0; color: var(--text-muted); }
.compliance-list li { margin-bottom: 6px; line-height: 1.5; }

/* Changelog */
.changelog { display: flex; flex-direction: column; gap: 12px; position: relative; }
.changelog::before {
  content: '';
  position: absolute;
  left: 6px; top: 8px; bottom: 8px;
  width: 1px;
  background: var(--border);
}
.log-entry { display: grid; grid-template-columns: 100px 80px 1fr; gap: 16px; font-size: 14px; position: relative; padding-left: 20px; }
.log-entry::before {
  content: '';
  position: absolute;
  left: 3px; top: 6px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
}
.log-version { font-family: var(--font-mono); font-size: 12.5px; color: var(--text); font-weight: 500; }
.log-date { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-subtle); }
.log-note { color: var(--text-muted); }

/* Side panel */
.side-card {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  padding: 18px;
}
.side-card h5 {
  margin: 0 0 12px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-subtle);
  font-weight: 600;
}
.side-list { display: flex; flex-direction: column; gap: 8px; }
.side-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; gap: 12px; }
.side-row .k { color: var(--text-subtle); }
.side-row .v { color: var(--text); font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
.related-pattern {
  display: block;
  padding: 10px 12px;
  border-radius: 6px;
  background: var(--bg-muted);
  color: var(--text);
  text-decoration: none;
  font-size: 13.5px;
  margin-bottom: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.12s;
  font-family: inherit;
  text-align: left;
  width: 100%;
}
.related-pattern:hover { border-color: var(--border-strong); }
.related-pattern strong { display: block; font-weight: 500; margin-bottom: 2px; }
.related-pattern span { font-size: 12px; color: var(--text-subtle); }

/* Compare view */
.compare {
  display: grid;
  grid-template-columns: 220px 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  overflow: hidden;
}
.compare > div { background: var(--bg-elev); padding: 14px 18px; font-size: 14px; }
.compare .c-head { background: var(--bg-muted); font-weight: 600; font-family: var(--font-display); font-size: 16px; }
.compare .c-label { background: var(--bg-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-subtle); font-weight: 600; align-self: center; }
.compare-picker {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

/* Index page sections */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}

/* SVG icons */
.icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.icon-lg { width: 20px; height: 20px; }
.icon-xl { width: 28px; height: 28px; }

/* Toggle */
.toggle {
  width: 34px;
  height: 20px;
  border-radius: 20px;
  background: var(--border-strong);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  border: none;
  padding: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: white;
  top: 3px; left: 3px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(14px); }

/* Accent bars on cards by pattern */
.pattern-card[data-pa="ascensionBlue"] { --card-accent: #0F3C97; --card-accent-soft: #E8F5FE; }
.pattern-card[data-pa="mediumBlue"]   { --card-accent: #1E69D2; --card-accent-soft: #E8F5FE; }
.pattern-card[data-pa="violet"]       { --card-accent: #9A0A81; --card-accent-soft: #FDE6EE; }
.pattern-card[data-pa="green"]        { --card-accent: #00806D; --card-accent-soft: #E6FFFB; }
[data-theme="dark"] .pattern-card[data-pa="ascensionBlue"] { --card-accent-soft: rgba(15,60,151,0.25); }
[data-theme="dark"] .pattern-card[data-pa="mediumBlue"] { --card-accent-soft: rgba(30,105,210,0.18); }
[data-theme="dark"] .pattern-card[data-pa="violet"] { --card-accent-soft: rgba(154,10,129,0.2); }
[data-theme="dark"] .pattern-card[data-pa="green"] { --card-accent-soft: rgba(0,162,138,0.18); }

/* Empty state */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-muted);
}
.empty-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; margin: 8px 0 4px; color: var(--text); }

/* Responsive */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; grid-template-areas: "top" "main"; }
  .sidebar { display: none; }
  main { padding: 28px 20px; }
  .detail-layout { grid-template-columns: 1fr; }
  .detail-side { position: static; }
  .compare { grid-template-columns: 1fr; }
  .edge-item { grid-template-columns: 1fr; gap: 6px; }
  .two-col { grid-template-columns: 1fr; }
}

/* Focus rings */
button:focus-visible, a:focus-visible, input:focus-visible {
  /* Helix Focus/Main — dashed, offset outline */
  outline: 2px dashed var(--focus);
  outline-offset: 2px;
  border-radius: 4px;
}

<script type="text/babel">// Conversation simulator — turn-by-turn playback
const { useState, useEffect, useRef } = React;

function Simulator({ pattern }) {
  const [turn, setTurn] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [typing, setTyping] = useState(false);
  const [channel, setChannel] = useState(pattern.channel[0]);
  const scrollRef = useRef(null);

  const turns = pattern.transcript;
  const visible = turns.slice(0, turn);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [turn, typing]);

  useEffect(() => {
    if (!playing) return;
    if (turn >= turns.length) { setPlaying(false); return; }
    const next = turns[turn];
    const isGrace = next.speaker === 'grace';
    const typingDelay = isGrace ? 900 : 600;
    const pauseAfter = isGrace ? 1400 : 800;
    setTyping(isGrace);
    const t1 = setTimeout(() => {
      setTyping(false);
      setTurn((t) => t + 1);
    }, typingDelay);
    return () => clearTimeout(t1);
  }, [playing, turn, turns]);

  useEffect(() => {
    if (!playing) return;
    if (turn >= turns.length) return;
    const t = setTimeout(() => {}, 1200);
    return () => clearTimeout(t);
  }, [turn, playing]);

  const restart = () => { setTurn(0); setTyping(false); setPlaying(false); };
  const step = () => {
    if (turn >= turns.length) return;
    setTyping(false);
    setTurn(turn + 1);
  };
  const togglePlay = () => {
    if (turn >= turns.length) restart();
    setPlaying((p) => !p);
  };

  const progress = Math.round((turn / turns.length) * 100);

  return (
    <div className="simulator">
      <div className="sim-head">
        <div className="sim-head-left">
          <div className="sim-dots">
            <span className={playing ? 'live' : ''}></span>
            <span className={playing ? 'live' : ''}></span>
            <span className={playing ? 'live' : ''}></span>
          </div>
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>
            {playing ? 'LIVE' : turn >= turns.length ? 'END' : 'READY'} · session-{pattern.id.slice(0,6)}-94a2
          </span>
        </div>
        <div className="sim-head-right">
          <div className="channel-switch">
            {pattern.channel.map((c) => (
              <button key={c} className={channel === c ? 'on' : ''} onClick={() => setChannel(c)}>
                <Icon name={c === 'Voice' ? 'mic' : 'sms'} size={12} /> {c}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="sim-body" ref={scrollRef}>
        {visible.map((t, i) => (
          <div key={i} className={`bubble ${t.speaker}`}>
            <div className="bubble-label">
              {t.speaker === 'grace' ? 'Grace' : 'Patient'} · turn {i + 1}
            </div>

<script type="text/babel">// Flow diagram — auto-layout DAG, left-to-right rows
function FlowDiagram({ pattern }) {
  const nodes = pattern.states;
  const edges = pattern.transitions;

  // Simple BFS layering for x-position; nodes in same layer share x, y stacks.
  const inDeg = {};
  nodes.forEach(n => inDeg[n.id] = 0);
  edges.forEach(([a, b]) => { inDeg[b] = (inDeg[b] || 0) + 1; });

  // Compute layers via topo
  const layer = {};
  const queue = nodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
  queue.forEach(id => layer[id] = 0);
  const remainingIn = { ...inDeg };
  let head = 0;
  const order = [];
  while (head < queue.length) {
    const id = queue[head++];
    order.push(id);
    edges.filter(([a]) => a === id).forEach(([, b]) => {
      remainingIn[b]--;
      layer[b] = Math.max(layer[b] || 0, (layer[id] || 0) + 1);
      if (remainingIn[b] === 0) queue.push(b);
    });
  }
  nodes.forEach(n => { if (layer[n.id] === undefined) layer[n.id] = 0; });

  const layers = {};
  nodes.forEach(n => {
    const L = layer[n.id];
    layers[L] = layers[L] || [];
    layers[L].push(n);
  });

  const layerKeys = Object.keys(layers).map(Number).sort((a, b) => a - b);
  const colW = 150;
  const rowH = 60;
  const nodeW = 118;
  const nodeH = 36;
  const padX = 24;
  const padY = 24;

  const maxRows = Math.max(...layerKeys.map(l => layers[l].length));
  const w = padX * 2 + layerKeys.length * colW;
  const h = padY * 2 + maxRows * rowH;

  const pos = {};
  layerKeys.forEach((L, li) => {
    const col = layers[L];
    const colCount = col.length;
    col.forEach((n, ni) => {
      const x = padX + li * colW + (colW - nodeW) / 2;
      // center vertically
      const totalH = colCount * rowH;
      const yStart = padY + (maxRows * rowH - totalH) / 2;
      const y = yStart + ni * rowH + (rowH - nodeH) / 2;
      pos[n.id] = { x, y, w: nodeW, h: nodeH };
    });
  });

  const pathFor = (a, b) => {
    const A = pos[a], B = pos[b];
    if (!A || !B) return '';
    const x1 = A.x + A.w, y1 = A.y + A.h / 2;
    const x2 = B.x, y2 = B.y + B.h / 2;
    const mx = (x1 + x2) / 2;
    return `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2 - 6} ${y2}`;
  };

  return (
    <div className="flow-diagram">
      <svg className="flow-svg" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" className="flow-edge-arrow" />
          </marker>
        </defs>
        {edges.map(([a, b], i) => (
          <path key={i} d={pathFor(a, b)} className="flow-edge" markerEnd="url(#arrow)" />
        ))}
        {nodes.map(n => {
          const p = pos[n.id];
          if (!p) return null;
          return (
            <g key={n.id} className={`flow-node ${n.kind}`} transform={`translate(${p.x}, ${p.y})`}>
              <rect width={p.w} height={p.h} rx={n.kind === 'decision' ? 4 : 6} />
              <text x={p.w / 2} y={p.h / 2 + 4} textAnchor="middle">{n.label}</text>
            </g>
          );
        })}
      </svg>
      <div style={{ display: 'flex', gap: 18, marginTop: 16, fontSize: 12, color: 'var(--text-subtle)', flexWrap: 'wrap' }}>
        <Legend swatch={{ background: 'var(--accent-soft)', border: '1.5px solid var(--accent)' }} label="Entry" />
        <Legend swatch={{ background: 'var(--bg-elev)', border: '1.5px solid var(--border-strong)' }} label="Collect / Output" />
        <Legend swatch={{ background: 'var(--bg-muted)', border: '1.5px solid var(--border-strong)' }} label="Decision" />
        <Legend swatch={{ background: 'var(--bg-elev)', border: '1.5px dashed var(--border-strong)' }} label="Action" />
        <Legend swatch={{ background: 'var(--success-bg)', border: '1.5px solid var(--success)' }} label="Exit (success)" />
        <Legend swatch={{ background: 'var(--error-bg)', border: '1.5px solid var(--error)' }} label="Exit (handoff)" />
      </div>
    </div>
  );
}

const Legend = ({ swatch, label }) => (
  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
    <span style={{ width: 14, height: 10, borderRadius: 2, ...swatch, display: 'inline-block' }}></span>
    {label}
  </span>
);

<script type="text/babel">// Main app shell
const { useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "ascensionBlue",
  "density": "comfortable",
  "card": "shadowed",
  "layout": "sidebar"
}/*EDITMODE-END*/;

function useTweaks() {
  const [t, setT] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('cpl_tweaks') || '{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  useEffect(() => {
    const root = document.documentElement;
    root.setAttribute('data-theme', t.theme);
    root.setAttribute('data-accent', t.accent);
    root.setAttribute('data-density', t.density);
    root.setAttribute('data-card', t.card);
    localStorage.setItem('cpl_tweaks', JSON.stringify(t));
  }, [t]);
  return [t, setT];
}

function TweaksPanel({ tweaks, setTweaks }) {
  const setK = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  const Seg = ({ k, opts }) => (
    <div className="seg">
      {opts.map(o => (
        <button key={o} className={tweaks[k] === o ? 'on' : ''} onClick={() => setK(k, o)}>{o}</button>
      ))}
    </div>
  );
  return (
    <div className="tweaks-panel">
      <div className="tweaks-head">
        <span className="tweaks-title">Tweaks</span>
        <Icon name="sliders" size={14} />
      </div>
      <div className="tweaks-body">
        <div className="tweak-row">
          <span className="tweak-label">Theme</span>
          <Seg k="theme" opts={['light', 'dark']} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Accent</span>
          <div className="swatches">
            {[
              ['ascensionBlue', '#0F3C97'],
              ['mediumBlue', '#1E69D2'],
              ['violet', '#9A0A81'],
              ['green', '#00806D'],
            ].map(([k, hex]) => (
              <button key={k} className={`swatch ${tweaks.accent === k ? 'on' : ''}`}
                style={{ background: hex }} onClick={() => setK('accent', k)} title={k} />
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Density</span>
          <Seg k="density" opts={['compact', 'comfortable', 'spacious']} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Card style</span>
          <Seg k="card" opts={['flat', 'bordered', 'shadowed']} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Layout</span>
          <Seg k="layout" opts={['sidebar', 'topnav']} />
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useTweaks();
  const [editMode, setEditMode] = useState(false);
  const [view, setView] = useState(() => {
    const v = localStorage.getItem('cpl_view') || 'library';
    return ['library', 'compare', 'shared', 'sms', 'detail'].includes(v) ? v : 'library';
  });
  const [openId, setOpenId] = useState(() => {
    const v = localStorage.getItem('cpl_open');
    return v && window.Patterns.some(p => p.id === v) ? v : null;
  });
  const [filters, setFilters] = useState({ q: '', category: '', status: '', channel: '', tag: '' });

  useEffect(() => { localStorage.setItem('cpl_view', view); }, [view]);
  useEffect(() => { openId ? localStorage.setItem('cpl_open', openId) : localStorage.removeItem('cpl_open'); }, [openId]);

  // Edit-mode wiring — register listener BEFORE announcing
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Cmd-K focus search
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('search-input')?.focus();
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const open = (id) => { setOpenId(id); setView('detail'); window.scrollTo(0, 0); };
  const back = () => { setOpenId(null); setView('library'); };

  const patterns = window.Patterns;
  const currentPattern = patterns.find(p => p.id === openId);

  useEffect(() => {
    if (view === 'detail' && !currentPattern) { setView('library'); setOpenId(null); }
  }, [view, currentPattern]);

  const navItems = [
    { id: 'library', label: 'Pattern library', icon: 'grid', count: patterns.length },
    { id: 'compare', label: 'Compare', icon: 'compare' },
  ];
  const sharedItems = [
    { id: 'shared', label: 'Shared rules', icon: 'shield' },
    { id: 'sms', label: 'SMS spec', icon: 'sms' },
  ];

  const renderNav = (topnav) => (
    <>
      {!topnav && <>
        <div className="nav-section">
          <div className="nav-label">Workspace</div>
          {navItems.map(n => (
            <button key={n.id} className={`nav-item ${view === n.id && !openId ? 'active' : ''}`} onClick={() => { setView(n.id); setOpenId(null); }}>
              <Icon name={n.icon} size={15} />
              <span>{n.label}</span>
              {n.count && <span className="count">{n.count}</span>}
            </button>
          ))}
        </div>
        <div className="nav-section">
          <div className="nav-label">Patterns</div>
          {patterns.map(p => (
            <button key={p.id} className={`nav-item ${openId === p.id ? 'active' : ''}`} onClick={() => open(p.id)}>
              <span style={{ width: 8, height: 8, borderRadius: 2, background: `var(--brand-${p.accent === 'ascensionBlue' ? 'ascension' : p.accent === 'mediumBlue' ? 'medium' : p.accent})`, flexShrink: 0 }}></span>
              <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.title}</span>
            </button>
          ))}
        </div>
        <div className="nav-section">
          <div className="nav-label">Shared components</div>
          {sharedItems.map(n => (
            <button key={n.id} className={`nav-item ${view === n.id ? 'active' : ''}`} onClick={() => { setView(n.id); setOpenId(null); }}>
              <Icon name={n.icon} size={15} />
              <span>{n.label}</span>
            </button>
          ))}
        </div>
        <div className="nav-section">
          <div className="nav-label">Resources</div>
          <a className="nav-item" href="https://helix.ascension.org/6e5694746/p/116b76-conversation-design" target="_blank" rel="noopener" style={{ textDecoration: 'none', alignItems: 'flex-start' }}>
            <Icon name="book" size={15} />
            <span style={{ flex: 1, lineHeight: 1.35 }}>
              Conversation Design Standards
              <span style={{ display: 'block', fontSize: 11.5, color: 'var(--text-subtle)', fontFamily: 'var(--font-mono)', marginTop: 2 }}>helix.ascension.org</span>
            </span>
            <span style={{ marginTop: 2 }}><Icon name="outbound" size={12} /></span>
          </a>
        </div>
      </>}
      {topnav && (
        <div className="topbar-nav">
          {[...navItems, ...sharedItems].map(n => (
            <button key={n.id} className={`topbar-nav-item ${view === n.id && !openId ? 'active' : ''}`} onClick={() => { setView(n.id); setOpenId(null); }}>
              {n.label}
            </button>
          ))}
          <a className="topbar-nav-item" href="https://helix.ascension.org/6e5694746/p/116b76-conversation-design" target="_blank" rel="noopener" style={{ textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 5 }}>
            Helix standards <Icon name="outbound" size={11} />
          </a>
        </div>
      )}
    </>
  );

  return (
    <div className="app" data-layout={tweaks.layout}>
      <aside className="sidebar">
        <div className="wordmark">
          <div className="wordmark-dot"></div>
          <div>
            <div className="wordmark-main">Grace</div>
            <div className="wordmark-sub">Pattern Library</div>
          </div>
        </div>
        {renderNav(false)}
      </aside>

      <header className="topbar">
        <div className="topbar-wordmark">
          <div className="wordmark-dot"></div>
          <div>
            <div className="wordmark-main">Grace</div>
            <div className="wordmark-sub">Pattern Library</div>
          </div>
        </div>
        {renderNav(true)}
        <div className="search">
          <span className="search-icon"><Icon name="search" size={14} /></span>
          <input
            id="search-input"
            placeholder="Search patterns, tags, transcripts…"
            value={filters.q}
            onChange={e => setFilters({ ...filters, q: e.target.value })}
            onFocus={() => { if (view !== 'library') { setView('library'); setOpenId(null); } }}
          />
          <span className="kbd">⌘K</span>
        </div>
        <div className="topbar-spacer"></div>
        <div className="topbar-actions">
          <button className="btn" onClick={() => {
            const next = tweaks.theme === 'light' ? 'dark' : 'light';
            setTweaks({ ...tweaks, theme: next });
          }} title="Toggle theme">
            <Icon name={tweaks.theme === 'light' ? 'moon' : 'sun'} size={14} />
          </button>
          <button className="btn primary"><Icon name="download" size={13} />Export</button>
        </div>
      </header>

      <main>
        {view === 'library' && !openId && <Library patterns={patterns} filters={filters} setFilters={setFilters} onOpen={open} />}
        {view === 'compare' && <Compare patterns={patterns} />}
        {view === 'shared' && <SharedRules />}
        {view === 'sms' && <SMSSpec />}
        {view === 'detail' && currentPattern && <Detail pattern={currentPattern} onBack={back} onOpen={open} />}
      </main>

      {editMode && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
