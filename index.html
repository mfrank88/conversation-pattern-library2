<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="mediumBlue" data-density="comfortable" data-card="bordered">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grace — Conversation Pattern Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>/* Conversation Pattern Library — base styles */

:root {
  /* Brand colors */
  --brand-ascension: #1B4297;
  --brand-medium: #1E69D2;
  --brand-violet: #B40F87;
  --brand-green: #009498;
  --brand-tan: #E8D9B8;
  --brand-orange: #E87722;
  --brand-gold: #D4A017;

  /* Light theme surfaces */
  --bg: #FBFAF7;
  --bg-elev: #FFFFFF;
  --bg-muted: #F3F0E9;
  --bg-inset: #EFEBE1;
  --border: #E5DFD1;
  --border-strong: #C9C0AB;
  --text: #1A1A1F;
  --text-muted: #5A5A63;
  --text-subtle: #8A8A90;

  /* Accent (default = medium blue) */
  --accent: var(--brand-medium);
  --accent-ink: #0E3A78;
  --accent-soft: #E3EEFB;

  /* Type */
  --font-sans: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --font-display: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;

  /* Density (swapped via [data-density]) */
  --space-unit: 8px;
  --row-pad-y: 14px;
  --card-pad: 24px;
  --font-body: 15.5px;
  --font-small: 13px;
  --line-body: 1.55;

  /* Card (swapped via [data-card]) */
  --card-radius: 8px;
  --card-shadow: 0 1px 2px rgba(20, 20, 30, 0.04);
  --card-border: 1px solid var(--border);
  --card-bg: var(--bg-elev);
}

/* Density variants */
[data-density="compact"] {
  --row-pad-y: 10px;
  --card-pad: 16px;
  --font-body: 14.5px;
  --font-small: 12.5px;
  --line-body: 1.45;
}
[data-density="spacious"] {
  --row-pad-y: 20px;
  --card-pad: 32px;
  --font-body: 16.5px;
  --font-small: 13.5px;
  --line-body: 1.65;
}

/* Card style variants */
[data-card="flat"] {
  --card-shadow: none;
  --card-border: 1px solid transparent;
  --card-bg: var(--bg-muted);
}
[data-card="bordered"] {
  --card-shadow: none;
  --card-border: 1px solid var(--border);
  --card-bg: var(--bg-elev);
}
[data-card="shadowed"] {
  --card-shadow: 0 1px 3px rgba(20, 20, 30, 0.06), 0 8px 24px -12px rgba(20, 20, 30, 0.08);
  --card-border: 1px solid transparent;
  --card-bg: var(--bg-elev);
}

/* Accent variants */
[data-accent="ascensionBlue"] { --accent: #1B4297; --accent-ink: #0F2F70; --accent-soft: #E0E7F3; }
[data-accent="mediumBlue"]   { --accent: #1E69D2; --accent-ink: #0E3A78; --accent-soft: #E3EEFB; }
[data-accent="violet"]       { --accent: #B40F87; --accent-ink: #7B0B5C; --accent-soft: #F8E3F1; }
[data-accent="green"]        { --accent: #009498; --accent-ink: #006568; --accent-soft: #DEF2F2; }

/* Dark theme */
[data-theme="dark"] {
  --bg: #0E1116;
  --bg-elev: #151A21;
  --bg-muted: #1C222B;
  --bg-inset: #0A0D12;
  --border: #242B36;
  --border-strong: #37414F;
  --text: #ECEEF2;
  --text-muted: #A0A6B3;
  --text-subtle: #6B7384;
  --accent-soft: rgba(30, 105, 210, 0.15);
}
[data-theme="dark"][data-accent="violet"] { --accent-soft: rgba(180, 15, 135, 0.18); }
[data-theme="dark"][data-accent="green"] { --accent-soft: rgba(0, 148, 152, 0.18); }
[data-theme="dark"][data-accent="ascensionBlue"] { --accent-soft: rgba(27, 66, 151, 0.22); }
[data-theme="dark"][data-card="flat"] { --card-bg: var(--bg-muted); }
[data-theme="dark"][data-card="shadowed"] { --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.5), 0 10px 30px -15px rgba(0, 0, 0, 0.7); }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: var(--font-body);
  line-height: var(--line-body);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* App shell */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: auto 1fr;
  grid-template-areas: "side top" "side main";
}
.app[data-layout="topnav"] {
  grid-template-columns: 1fr;
  grid-template-areas: "top" "main";
}

/* Sidebar */
.sidebar {
  grid-area: side;
  border-right: 1px solid var(--border);
  background: var(--bg-elev);
  padding: 24px 18px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.app[data-layout="topnav"] .sidebar { display: none; }
.wordmark {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 28px;
  padding: 0 8px;
}
.wordmark-dot {
  width: 10px; height: 10px; border-radius: 2px;
  background: var(--accent);
  transform: translateY(1px);
}
.wordmark-main {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.01em;
  color: var(--text);
}
.wordmark-sub {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-subtle);
  font-weight: 500;
}

.nav-section {
  margin-bottom: 20px;
}
.nav-label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-subtle);
  font-weight: 600;
  padding: 0 10px;
  margin-bottom: 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  transition: background 0.12s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.nav-item:hover { background: var(--bg-muted); color: var(--text); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent-ink);
}
[data-theme="dark"] .nav-item.active { color: var(--text); }
.nav-item .count {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-subtle);
  font-variant-numeric: tabular-nums;
}

/* Top bar */
.topbar {
  grid-area: top;
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.app[data-layout="topnav"] .topbar { padding-left: 28px; }
.topbar-wordmark {
  display: none;
}
.app[data-layout="topnav"] .topbar-wordmark {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-right: 32px;
}
.app[data-layout="topnav"] .topbar-nav {
  display: flex;
  gap: 4px;
}
.topbar-nav { display: none; }
.topbar-nav-item {
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: none;
  font-family: inherit;
}
.topbar-nav-item:hover { background: var(--bg-muted); color: var(--text); }
.topbar-nav-item.active { background: var(--accent-soft); color: var(--accent-ink); }
[data-theme="dark"] .topbar-nav-item.active { color: var(--text); }

.search {
  flex: 1;
  max-width: 480px;
  position: relative;
}
.search input {
  width: 100%;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  padding: 0 12px 0 36px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-subtle);
  pointer-events: none;
}
.kbd {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-subtle);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--bg-muted);
  pointer-events: none;
}

.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* Main */
main {
  grid-area: main;
  padding: 40px 48px 80px;
  max-width: 1400px;
  width: 100%;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 13px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
}
.btn:hover { background: var(--bg-muted); }
.btn.primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn.primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.ghost:hover { background: var(--bg-muted); }

/* Page header */
.page-head {
  margin-bottom: 36px;
}
.eyebrow {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}
h1.page-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 40px;
  line-height: 1.1;
  letter-spacing: -0.015em;
  margin: 0 0 10px;
  color: var(--text);
}
.page-desc {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 680px;
  margin: 0;
  line-height: 1.55;
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  align-items: center;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}
.chip:hover { border-color: var(--border-strong); color: var(--text); }
.chip.on {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-ink);
  font-weight: 500;
}
[data-theme="dark"] .chip.on { color: var(--text); }
.chip .x { opacity: 0.5; margin-left: 2px; }

/* Pattern grid */
.pattern-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}
.pattern-card {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  padding: var(--card-pad);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  text-align: left;
  font-family: inherit;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 240px;
}
.pattern-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-2px);
}
[data-card="shadowed"] .pattern-card:hover {
  box-shadow: 0 4px 8px rgba(20, 20, 30, 0.06), 0 20px 40px -18px rgba(20, 20, 30, 0.15);
}
.pattern-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--card-accent, var(--accent));
  opacity: 0;
  transition: opacity 0.15s;
}
.pattern-card:hover::before { opacity: 1; }

.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.card-badge {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--card-accent-soft, var(--accent-soft));
  color: var(--card-accent, var(--accent-ink));
}
.card-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  color: var(--text-subtle);
  font-variant-numeric: tabular-nums;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.status-dot.production { background: var(--brand-green); }
.status-dot.beta { background: var(--brand-orange); }
.status-dot.draft { background: var(--brand-gold); }
.status-dot.deprecated { background: var(--text-subtle); }

.card-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin: 0;
}
.card-summary {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.5;
  margin: 0;
  flex: 1;
}
.card-meta {
  display: flex;
  gap: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-subtle);
}
.card-meta .val { color: var(--text); font-weight: 500; }
.card-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.tag {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 3px;
  background: var(--bg-muted);
  color: var(--text-muted);
  font-weight: 500;
}

/* Tweaks panel */
.tweaks-panel {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 280px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.05);
  z-index: 100;
  overflow: hidden;
}
[data-theme="dark"] .tweaks-panel {
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 2px 6px rgba(0, 0, 0, 0.3);
}
.tweaks-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-muted);
}
.tweaks-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.tweaks-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }
.tweak-row { display: flex; flex-direction: column; gap: 6px; }
.tweak-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-subtle); font-weight: 600; }
.seg {
  display: flex;
  background: var(--bg-muted);
  border-radius: 6px;
  padding: 2px;
  gap: 2px;
}
.seg button {
  flex: 1;
  padding: 6px 8px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-muted);
  text-transform: capitalize;
}
.seg button.on { background: var(--bg-elev); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
[data-theme="dark"] .seg button.on { background: var(--bg-inset); }

.swatches { display: flex; gap: 6px; }
.swatch {
  width: 28px; height: 28px; border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s;
}
.swatch:hover { transform: scale(1.1); }
.swatch.on { border-color: var(--text); }

/* Detail page */
.detail-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 48px;
}
.detail-main { min-width: 0; }
.detail-side {
  position: sticky;
  top: 88px;
  align-self: start;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.detail-head {
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
  margin-bottom: 32px;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-subtle);
  margin-bottom: 14px;
}
.breadcrumb button {
  background: none; border: none; cursor: pointer; font-family: inherit;
  color: var(--text-muted); font-size: 13px; padding: 0;
}
.breadcrumb button:hover { color: var(--text); text-decoration: underline; }
.detail-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 44px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 0 0 14px;
}
.detail-summary {
  font-size: 19px;
  line-height: 1.5;
  color: var(--text-muted);
  max-width: 680px;
  margin: 0 0 18px;
}
.detail-meta-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  font-size: 13px;
  color: var(--text-subtle);
}
.detail-meta-row .item { display: inline-flex; align-items: center; gap: 6px; }
.detail-meta-row .item strong { color: var(--text); font-weight: 500; }

/* Section */
.section {
  margin-bottom: 48px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0 0 14px;
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.section-title .section-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
}
.section-lead { color: var(--text-muted); margin: 0 0 18px; max-width: 680px; }

/* Metrics */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}
.metric {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  padding: 16px 18px;
  box-shadow: var(--card-shadow);
}
.metric-label { font-size: 12px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 8px; }
.metric-val { font-family: var(--font-display); font-size: 28px; font-weight: 500; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
.metric-delta {
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.metric-delta.up { color: var(--brand-green); }
.metric-delta.down { color: var(--brand-orange); }
.metric-delta.flat { color: var(--text-subtle); }

/* Two-col block (when-to-use) */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.note-card {
  padding: 18px 20px;
  border-radius: var(--card-radius);
  border: 1px solid var(--border);
  background: var(--card-bg);
}
.note-card.good { border-left: 3px solid var(--brand-green); }
.note-card.bad { border-left: 3px solid var(--brand-violet); }
.note-card h4 { margin: 0 0 6px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-subtle); font-weight: 600; }
.note-card p { margin: 0; color: var(--text); line-height: 1.5; font-size: 14.5px; }

/* Transcript / Simulator */
.simulator {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.sim-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-muted);
}
.sim-head-left { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
.sim-head-right { display: flex; gap: 6px; }
.sim-dots { display: flex; gap: 4px; }
.sim-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
.sim-dots span.live { background: var(--brand-green); animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.sim-body {
  min-height: 320px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;

  color: white;
  align-self: flex-start;
  border-bottom-left-radius: 4px;

.bubble.patient {

  border: 1px solid var(--border);
  color: var(--text);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.bubble-label {

  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 4px;
  opacity: 0.8;
}
.bubble-note {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid rgba(255, 255, 255, 0.2);
  font-size: 12px;
  font-family: var(--font-mono);
  opacity: 0.85;
  line-height: 1.4;

.typing {

.typing span:nth-child(3) { animation-delay: 0.3s; }

.sim-controls {

  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);

  gap: 12px;
  flex-wrap: wrap;
}
.sim-progress {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;

}
.sim-progress-bar {

  height: 3px;

.flow-diagram {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  padding: 28px;
  overflow-x: auto;

.flow-svg { display: block; min-width: 100%; }
.flow-node rect { fill: var(--bg-elev); stroke: var(--border-strong); stroke-width: 1.5; transition: all 0.2s; }
.flow-node.entry rect { fill: var(--accent-soft); stroke: var(--accent); }
.flow-node.exit-ok rect { fill: #DEF2F2; stroke: var(--brand-green); }
.flow-node.exit-fail rect { fill: #F8E3F1; stroke: var(--brand-violet); }
.flow-node.decision rect { fill: var(--bg-muted); }
.flow-node.action rect { stroke-dasharray: 4 3; }

[data-theme="dark"] .flow-node.exit-fail rect { fill: rgba(180,15,135,0.15); }
.flow-node text { font-family: var(--font-sans); font-size: 12px; fill: var(--text); font-weight: 500; }
.flow-edge { stroke: var(--border-strong); stroke-width: 1.5; fill: none; }

  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 20px;
  padding: 16px 18px;
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);

.edge-item .edge-behavior { color: var(--text-muted); font-size: 14.5px; line-height: 1.5; }

.compliance-list { padding-left: 20px; margin: 0; color: var(--text-muted); }

/* Changelog */
.changelog { display: flex; flex-direction: column; gap: 12px; position: relative; }
.changelog::before {

  position: absolute;
  left: 6px; top: 8px; bottom: 8px;
  width: 1px;

  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;

/* Index page sections */

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;

.icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

.icon-xl { width: 28px; height: 28px; }

/* Toggle */

  height: 20px;

/* Responsive */
@media (max-width: 900px) {

  main { padding: 28px 20px; }
  .detail-layout { grid-template-columns: 1fr; }
  .detail-side { position: static; }
  .compare { grid-template-columns: 1fr; }
  .edge-item { grid-template-columns: 1fr; gap: 6px; }
  .two-col { grid-template-columns: 1fr; }

/* Focus rings */
button:focus-visible, a:focus-visible, input:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}

<script>// Design tokens for the Conversation Pattern Library
// Brand colors from Ascension / Grace palette.

// Tint scale: given a hex, generate 50-900 by mixing with white (lighter) / black (darker)
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}
function rgbToHex([r, g, b]) {
  const to = (n) => Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, '0');
  return `#${to(r)}${to(g)}${to(b)}`;
}
function mix(hex, target, amt) {
  const a = hexToRgb(hex);
  const b = hexToRgb(target);
  return rgbToHex([a[0] + (b[0] - a[0]) * amt, a[1] + (b[1] - a[1]) * amt, a[2] + (b[2] - a[2]) * amt]);
}
function scale(hex) {
  return {
    50: mix(hex, '#ffffff', 0.93),
    100: mix(hex, '#ffffff', 0.85),
    200: mix(hex, '#ffffff', 0.70),
    300: mix(hex, '#ffffff', 0.50),
    400: mix(hex, '#ffffff', 0.25),
    500: hex,
    600: mix(hex, '#000000', 0.15),
    700: mix(hex, '#000000', 0.30),
    800: mix(hex, '#000000', 0.45),
    900: mix(hex, '#000000', 0.60),
  };
}

window.Tokens = {
  brand: {
    ascensionBlue: '#1B4297',
    mediumBlue: '#1E69D2',
    violet: '#B40F87',
    green: '#009498',
    softTan: '#E8D9B8',
    orange: '#E87722',
    gold: '#D4A017',
  },
  scales: {
    ascensionBlue: scale('#1B4297'),
    mediumBlue: scale('#1E69D2'),
    violet: scale('#B40F87'),
    green: scale('#009498'),
    softTan: scale('#E8D9B8'),
    orange: scale('#E87722'),
    gold: scale('#D4A017'),
  },
};

<script type="text/babel">// Conversation simulator — turn-by-turn playback
const { useState, useEffect, useRef } = React;

function Simulator({ pattern }) {
  const [turn, setTurn] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [typing, setTyping] = useState(false);
  const [channel, setChannel] = useState(pattern.channel[0]);
  const scrollRef = useRef(null);

  const turns = pattern.transcript;
  const visible = turns.slice(0, turn);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [turn, typing]);

  useEffect(() => {
    if (!playing) return;
    if (turn >= turns.length) { setPlaying(false); return; }
    const next = turns[turn];
    const isGrace = next.speaker === 'grace';
    const typingDelay = isGrace ? 900 : 600;
    const pauseAfter = isGrace ? 1400 : 800;
    setTyping(isGrace);
    const t1 = setTimeout(() => {
      setTyping(false);
      setTurn((t) => t + 1);
    }, typingDelay);
    return () => clearTimeout(t1);
  }, [playing, turn, turns]);

  useEffect(() => {
    if (!playing) return;
    if (turn >= turns.length) return;
    const t = setTimeout(() => {}, 1200);
    return () => clearTimeout(t);
  }, [turn, playing]);

  const restart = () => { setTurn(0); setTyping(false); setPlaying(false); };
  const step = () => {
    if (turn >= turns.length) return;
    setTyping(false);
    setTurn(turn + 1);
  };
  const togglePlay = () => {
    if (turn >= turns.length) restart();
    setPlaying((p) => !p);
  };

  const progress = Math.round((turn / turns.length) * 100);

  return (
    <div className="simulator">
      <div className="sim-head">
        <div className="sim-head-left">
          <div className="sim-dots">
            <span className={playing ? 'live' : ''}></span>
            <span className={playing ? 'live' : ''}></span>
            <span className={playing ? 'live' : ''}></span>
          </div>
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>
            {playing ? 'LIVE' : turn >= turns.length ? 'END' : 'READY'} · session-{pattern.id.slice(0,6)}-94a2
          </span>
        </div>
        <div className="sim-head-right">
          <div className="channel-switch">
            {pattern.channel.map((c) => (
              <button key={c} className={channel === c ? 'on' : ''} onClick={() => setChannel(c)}>
                <Icon name={c === 'Voice' ? 'mic' : 'sms'} size={12} /> {c}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="sim-body" ref={scrollRef}>
        {visible.map((t, i) => (
          <div key={i} className={`bubble ${t.speaker}`}>
            <div className="bubble-label">
              {t.speaker === 'grace' ? 'Grace' : 'Patient'} · turn {i + 1}
            </div>
            <div>{t.text}</div>
            {t.note && <div className="bubble-note">// {t.note}</div>}
          </div>
        ))}
        {typing && (
          <div className="typing"><span></span><span></span><span></span></div>
        )}
        {turn === 0 && !playing && (
          <div style={{ textAlign: 'center', color: 'var(--text-subtle)', padding: '40px 20px', fontSize: 13, fontFamily: 'var(--font-mono)' }}>
            Press play to step through the {turns.length}-turn {channel.toLowerCase()} conversation.
          </div>
        )}
      </div>

      <div className="sim-controls">
        <div className="sim-btns">
          <button className="btn" onClick={restart} title="Restart">
            <Icon name="restart" size={13} />
          </button>
          <button className="btn primary" onClick={togglePlay}>
            <Icon name={playing ? 'pause' : 'play'} size={13} />
            {playing ? 'Pause' : turn >= turns.length ? 'Replay' : 'Play'}
          </button>
          <button className="btn" onClick={step} disabled={turn >= turns.length} title="Step forward">
            <Icon name="stepForward" size={13} />
          </button>
        </div>
        <div className="sim-progress">
          <span>{turn} / {turns.length}</span>
          <div className="sim-progress-bar"><div className="sim-progress-fill" style={{ width: `${progress}%` }}></div></div>
          <span>{progress}%</span>
        </div>
      </div>
    </div>
  );
}

window.Simulator = Simulator;
</script>
<script type="text/babel">// Flow diagram — auto-layout DAG, left-to-right rows
function FlowDiagram({ pattern }) {
  const nodes = pattern.states;
  const edges = pattern.transitions;

  // Simple BFS layering for x-position; nodes in same layer share x, y stacks.
  const inDeg = {};
  nodes.forEach(n => inDeg[n.id] = 0);
  edges.forEach(([a, b]) => { inDeg[b] = (inDeg[b] || 0) + 1; });

  // Compute layers via topo
  const layer = {};
  const queue = nodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
  queue.forEach(id => layer[id] = 0);
  const remainingIn = { ...inDeg };
  let head = 0;
  const order = [];
  while (head < queue.length) {
    const id = queue[head++];
    order.push(id);
    edges.filter(([a]) => a === id).forEach(([, b]) => {
      remainingIn[b]--;
      layer[b] = Math.max(layer[b] || 0, (layer[id] || 0) + 1);
      if (remainingIn[b] === 0) queue.push(b);
    });
  }
  nodes.forEach(n => { if (layer[n.id] === undefined) layer[n.id] = 0; });

  const layers = {};
  nodes.forEach(n => {
    const L = layer[n.id];
    layers[L] = layers[L] || [];
    layers[L].push(n);
  });

  const layerKeys = Object.keys(layers).map(Number).sort((a, b) => a - b);
  const colW = 150;
  const rowH = 60;
  const nodeW = 118;
  const nodeH = 36;
  const padX = 24;
  const padY = 24;

  const maxRows = Math.max(...layerKeys.map(l => layers[l].length));
  const w = padX * 2 + layerKeys.length * colW;
  const h = padY * 2 + maxRows * rowH;

  const pos = {};
  layerKeys.forEach((L, li) => {
    const col = layers[L];
    const colCount = col.length;
    col.forEach((n, ni) => {
      const x = padX + li * colW + (colW - nodeW) / 2;
      // center vertically
      const totalH = colCount * rowH;
      const yStart = padY + (maxRows * rowH - totalH) / 2;
      const y = yStart + ni * rowH + (rowH - nodeH) / 2;
      pos[n.id] = { x, y, w: nodeW, h: nodeH };
    });
  });

  const pathFor = (a, b) => {
    const A = pos[a], B = pos[b];
    if (!A || !B) return '';
    const x1 = A.x + A.w, y1 = A.y + A.h / 2;
    const x2 = B.x, y2 = B.y + B.h / 2;
    const mx = (x1 + x2) / 2;
    return `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2 - 6} ${y2}`;
  };

  return (
    <div className="flow-diagram">
      <svg className="flow-svg" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" className="flow-edge-arrow" />
          </marker>
        </defs>
        {edges.map(([a, b], i) => (
          <path key={i} d={pathFor(a, b)} className="flow-edge" markerEnd="url(#arrow)" />
        ))}
        {nodes.map(n => {
          const p = pos[n.id];
          if (!p) return null;
          return (
            <g key={n.id} className={`flow-node ${n.kind}`} transform={`translate(${p.x}, ${p.y})`}>
              <rect width={p.w} height={p.h} rx={n.kind === 'decision' ? 4 : 6} />
              <text x={p.w / 2} y={p.h / 2 + 4} textAnchor="middle">{n.label}</text>
            </g>
          );
        })}
      </svg>
      <div style={{ display: 'flex', gap: 18, marginTop: 16, fontSize: 12, color: 'var(--text-subtle)', flexWrap: 'wrap' }}>
        <Legend swatch={{ background: 'var(--accent-soft)', border: '1.5px solid var(--accent)' }} label="Entry" />
        <Legend swatch={{ background: 'var(--bg-elev)', border: '1.5px solid var(--border-strong)' }} label="Collect / Output" />
        <Legend swatch={{ background: 'var(--bg-muted)', border: '1.5px solid var(--border-strong)' }} label="Decision" />
        <Legend swatch={{ background: 'var(--bg-elev)', border: '1.5px dashed var(--border-strong)' }} label="Action" />
        <Legend swatch={{ background: '#DEF2F2', border: '1.5px solid var(--brand-green)' }} label="Exit (success)" />
        <Legend swatch={{ background: '#F8E3F1', border: '1.5px solid var(--brand-violet)' }} label="Exit (handoff)" />
      </div>
    </div>
  );
}

const Legend = ({ swatch, label }) => (
  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
    <span style={{ width: 14, height: 10, borderRadius: 2, ...swatch, display: 'inline-block' }}></span>

</script>

<script type="text/babel">// Library index + Compare views
function Library({ patterns, filters, setFilters, onOpen }) {
  const { q, category, status, channel, tag } = filters;
  const allCats = [...new Set(window.Patterns.map(p => p.category))];
  const allStatuses = [...new Set(window.Patterns.map(p => p.status))];
  const allChannels = ['Voice', 'SMS'];

  const filtered = patterns.filter(p => {
    if (q && !(p.title + p.summary + p.tags.join(' ') + p.category).toLowerCase().includes(q.toLowerCase())) return false;
    if (category && p.category !== category) return false;
    if (status && p.status !== status) return false;
    if (channel && !p.channel.includes(channel)) return false;
    if (tag && !p.tags.includes(tag)) return false;
    return true;
  });

  const stat = (label, value, sub) => (
    <div className="metric">
      <div className="metric-label">{label}</div>
      <div className="metric-val">{value}</div>
      {sub && <div className="metric-delta flat" style={{ color: 'var(--text-subtle)' }}>{sub}</div>}
    </div>
  );

  const production = window.Patterns.filter(p => p.status === 'Production').length;
  const beta = window.Patterns.filter(p => p.status === 'Beta').length;

  return (
    <div>
      <div className="page-head">
        <div className="eyebrow">Grace · AI Appointment Management</div>
        <h1 className="page-title">Conversation Pattern Library</h1>
        <p className="page-desc">
          Documented, versioned conversational flows for Grace — the AI voice agent handling appointment verification, scheduling, and clinical safety at Ascension.
        </p>
      </div>

      <div className="stats-row">
        {stat('Patterns', window.Patterns.length, 'across 5 categories')}
        {stat('Production', production, 'live in all regions')}
        {stat('Beta', beta, 'limited rollout')}
        {stat('Coverage', '91.3%', 'of inbound call intents')}
      </div>

      <div className="filter-bar">
        <strong style={{ fontSize: 12, letterSpacing: 0.06, textTransform: 'uppercase', color: 'var(--text-subtle)', marginRight: 4 }}>
          <Icon name="filter" size={11} style={{ marginRight: 4 }} /> Filter
        </strong>
        <Dropdown label={category || 'Category'} active={!!category} options={['', ...allCats]} onChange={v => setFilters({ ...filters, category: v })} />
        <Dropdown label={status || 'Status'} active={!!status} options={['', ...allStatuses]} onChange={v => setFilters({ ...filters, status: v })} />
        <Dropdown label={channel || 'Channel'} active={!!channel} options={['', ...allChannels]} onChange={v => setFilters({ ...filters, channel: v })} />
        {tag && (
          <button className="chip on" onClick={() => setFilters({ ...filters, tag: '' })}>
            {tag} <Icon name="x" size={10} className="icon x" />
          </button>
        )}
        {(category || status || channel || tag || q) && (
          <button className="btn ghost" onClick={() => setFilters({ q: '', category: '', status: '', channel: '', tag: '' })} style={{ fontSize: 12 }}>
            Clear all
          </button>
        )}
        <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--text-subtle)', fontVariantNumeric: 'tabular-nums' }}>
          {filtered.length} of {window.Patterns.length}
        </span>
      </div>

      {filtered.length === 0 ? (
        <div className="empty">
          <div className="empty-title">No patterns match</div>
          <div>Try clearing some filters.</div>
        </div>
      ) : (
        <div className="pattern-grid">
          {filtered.map(p => (
            <button key={p.id} className="pattern-card" data-pa={p.accent} onClick={() => onOpen(p.id)}>
              <div className="card-head">
                <span className="card-badge">{p.flowType}</span>
                <span className="card-status">
                  <span className={`status-dot ${p.status.toLowerCase()}`}></span>
                  {p.status} · v{p.version}
                </span>
              </div>
              <div>
                <h3 className="card-title">{p.title}</h3>
                <div style={{ fontSize: 12, color: 'var(--text-subtle)', marginTop: 4, fontFamily: 'var(--font-mono)' }}>
                  {p.id}
                </div>
              </div>
              <p className="card-summary">{p.summary}</p>
              <div className="card-tags">
                {p.tags.slice(0, 3).map(t => (
                  <span key={t} className="tag" onClick={(e) => { e.stopPropagation(); setFilters({ ...filters, tag: t }); }}>{t}</span>
                ))}
                {p.tags.length > 3 && <span className="tag">+{p.tags.length - 3}</span>}
              </div>
              <div className="card-meta">
                <span><span className="val">{p.avgDuration}</span> avg</span>
                <span><span className="val">{p.channel.join(' + ')}</span></span>
                <span style={{ marginLeft: 'auto', fontFamily: 'var(--font-mono)' }}>{p.updated}</span>
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function Dropdown({ label, options, onChange, active }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button className={`chip ${active ? 'on' : ''}`} onClick={() => setOpen(o => !o)}>
        {label} <Icon name="chevronDown" size={10} />
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: '110%', left: 0, zIndex: 20,
          background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8,
          boxShadow: '0 10px 30px rgba(0,0,0,0.1)', minWidth: 180, padding: 4, marginTop: 4
        }}>
          {options.map(o => (
            <button key={o || '-all-'} onClick={() => { onChange(o); setOpen(false); }}
              style={{
                display: 'block', width: '100%', textAlign: 'left', padding: '7px 10px',
                background: 'none', border: 'none', borderRadius: 4, fontFamily: 'inherit',
                fontSize: 13, color: 'var(--text)', cursor: 'pointer'
              }}
              onMouseEnter={e => e.target.style.background = 'var(--bg-muted)'}
              onMouseLeave={e => e.target.style.background = 'none'}>
              {o || 'All'}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

        <Row label="When to use" a={a.whenToUse} b={b.whenToUse} />

        <Row label="Primary KPI"
             a={<div><div style={{ fontFamily: 'var(--font-display)', fontSize: 22 }}>{a.metrics[0].value}</div><div style={{ fontSize: 12, color: 'var(--text-subtle)' }}>{a.metrics[0].label}</div></div>}
             b={<div><div style={{ fontFamily: 'var(--font-display)', fontSize: 22 }}>{b.metrics[0].value}</div><div style={{ fontSize: 12, color: 'var(--text-subtle)' }}>{b.metrics[0].label}</div></div>} />

}

window.Library = Library;

      ))}

      <div className="section">
        <h2 className="section-title"><span className="section-num">04</span>Status semantics</h2>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
          {[
            ['Production', 'production', 'Live in all regions'],
            ['Beta', 'beta', 'Limited rollout · telemetry collection'],
            ['Draft', 'draft', 'In design review'],
            ['Deprecated', 'deprecated', 'Scheduled for removal'],
          ].map(([label, cls, desc]) => (
            <div key={cls} className="metric">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className={`status-dot ${cls}`} style={{ width: 10, height: 10 }}></span>
                <strong>{label}</strong>
              </div>
              <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 6 }}>{desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

window.Tokens_View = Tokens;
</script>
<script type="text/babel">// Main app shell
const { useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "violet",
  "density": "comfortable",
  "card": "bordered",
  "layout": "sidebar"
}/*EDITMODE-END*/;

function useTweaks() {
  const [t, setT] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('cpl_tweaks') || '{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  useEffect(() => {
    const root = document.documentElement;
    root.setAttribute('data-theme', t.theme);
    root.setAttribute('data-accent', t.accent);
    root.setAttribute('data-density', t.density);
    root.setAttribute('data-card', t.card);
    localStorage.setItem('cpl_tweaks', JSON.stringify(t));
  }, [t]);
  return [t, setT];
}

function TweaksPanel({ tweaks, setTweaks }) {
  const setK = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  const Seg = ({ k, opts }) => (
    <div className="seg">
      {opts.map(o => (
        <button key={o} className={tweaks[k] === o ? 'on' : ''} onClick={() => setK(k, o)}>{o}</button>
      ))}
    </div>
  );
  return (
    <div className="tweaks-panel">
      <div className="tweaks-head">
        <span className="tweaks-title">Tweaks</span>
        <Icon name="sliders" size={14} />
      </div>
      <div className="tweaks-body">
        <div className="tweak-row">
          <span className="tweak-label">Theme</span>
          <Seg k="theme" opts={['light', 'dark']} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Accent</span>
          <div className="swatches">
            {[
              ['ascensionBlue', '#1B4297'],
              ['mediumBlue', '#1E69D2'],
              ['violet', '#B40F87'],
              ['green', '#009498'],
            ].map(([k, hex]) => (
              <button key={k} className={`swatch ${tweaks.accent === k ? 'on' : ''}`}
                style={{ background: hex }} onClick={() => setK('accent', k)} title={k} />
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Density</span>
          <Seg k="density" opts={['compact', 'comfortable', 'spacious']} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Card style</span>
          <Seg k="card" opts={['flat', 'bordered', 'shadowed']} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Layout</span>
          <Seg k="layout" opts={['sidebar', 'topnav']} />
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useTweaks();
  const [editMode, setEditMode] = useState(false);
  const [view, setView] = useState(() => localStorage.getItem('cpl_view') || 'library');
  const [openId, setOpenId] = useState(() => localStorage.getItem('cpl_open') || null);
  const [filters, setFilters] = useState({ q: '', category: '', status: '', channel: '', tag: '' });

  useEffect(() => { localStorage.setItem('cpl_view', view); }, [view]);
  useEffect(() => { openId ? localStorage.setItem('cpl_open', openId) : localStorage.removeItem('cpl_open'); }, [openId]);

  // Edit-mode wiring — register listener BEFORE announcing
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Cmd-K focus search
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('search-input')?.focus();
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const open = (id) => { setOpenId(id); setView('detail'); window.scrollTo(0, 0); };
  const back = () => { setOpenId(null); setView('library'); };

  const patterns = window.Patterns;
  const currentPattern = patterns.find(p => p.id === openId);

  const navItems = [
    { id: 'library', label: 'Pattern library', icon: 'grid', count: patterns.length },
    { id: 'compare', label: 'Compare', icon: 'compare' },
    { id: 'tokens', label: 'Design tokens', icon: 'layers' },
  ];

  const renderNav = (topnav) => (
    <>
      {!topnav && <>
        <div className="nav-section">
          <div className="nav-label">Workspace</div>
          {navItems.map(n => (
            <button key={n.id} className={`nav-item ${view === n.id && !openId ? 'active' : ''}`} onClick={() => { setView(n.id); setOpenId(null); }}>
              <Icon name={n.icon} size={15} />
              <span>{n.label}</span>
              {n.count && <span className="count">{n.count}</span>}
            </button>
          ))}
        </div>
        <div className="nav-section">
          <div className="nav-label">Patterns</div>
          {patterns.map(p => (
            <button key={p.id} className={`nav-item ${openId === p.id ? 'active' : ''}`} onClick={() => open(p.id)}>
              <span style={{ width: 8, height: 8, borderRadius: 2, background: `var(--brand-${p.accent === 'ascensionBlue' ? 'ascension' : p.accent === 'mediumBlue' ? 'medium' : p.accent})`, flexShrink: 0 }}></span>
              <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.title}</span>
            </button>
          ))}
        </div>
        <div className="nav-section">
          <div className="nav-label">Governance</div>
          <button className="nav-item"><Icon name="shield" size={15} />Compliance</button>
          <button className="nav-item"><Icon name="book" size={15} />Changelog</button>
        </div>
      </>}
      {topnav && (
        <div className="topbar-nav">
          {navItems.map(n => (
            <button key={n.id} className={`topbar-nav-item ${view === n.id && !openId ? 'active' : ''}`} onClick={() => { setView(n.id); setOpenId(null); }}>
              {n.label}
            </button>
          ))}
        </div>
      )}
    </>
  );

  return (
    <div className="app" data-layout={tweaks.layout}>
      <aside className="sidebar">
        <div className="wordmark">
          <div className="wordmark-dot"></div>
          <div>
            <div className="wordmark-main">Grace</div>
            <div className="wordmark-sub">Pattern Library</div>
          </div>
        </div>
        {renderNav(false)}
      </aside>

      <header className="topbar">
        <div className="topbar-wordmark">
          <div className="wordmark-dot"></div>
          <div>
            <div className="wordmark-main">Grace</div>
            <div className="wordmark-sub">Pattern Library</div>
          </div>
        </div>
        {renderNav(true)}
        <div className="search">
          <span className="search-icon"><Icon name="search" size={14} /></span>
          <input
            id="search-input"
            placeholder="Search patterns, tags, transcripts…"
            value={filters.q}
            onChange={e => setFilters({ ...filters, q: e.target.value })}
            onFocus={() => { if (view !== 'library') { setView('library'); setOpenId(null); } }}
          />
          <span className="kbd">⌘K</span>
        </div>
        <div className="topbar-spacer"></div>
        <div className="topbar-actions">
          <button className="btn" onClick={() => {
            const next = tweaks.theme === 'light' ? 'dark' : 'light';
            setTweaks({ ...tweaks, theme: next });
          }} title="Toggle theme">
            <Icon name={tweaks.theme === 'light' ? 'moon' : 'sun'} size={14} />
          </button>
          <button className="btn primary"><Icon name="download" size={13} />Export</button>
        </div>
      </header>

      <main>
        {view === 'library' && !openId && <Library patterns={patterns} filters={filters} setFilters={setFilters} onOpen={open} />}
        {view === 'compare' && <Compare patterns={patterns} />}
        {view === 'tokens' && <Tokens_View />}
        {view === 'detail' && currentPattern && <Detail pattern={currentPattern} onBack={back} onOpen={open} />}
      </main>

      {editMode && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
